{% extends "base.html" %}
{% block title %}URL Preview — SecureCorp{% endblock %}
{% block content %}
<section class="panel">
  <h2>URL Preview</h2>
  <p>Preview the response from an external or internal URL before sharing it.</p>
  <form method="get" action="{{ url_for('fetch_url') }}">
    <label for="url">URL</label>
    <input id="url" name="url" value="{{ url }}" placeholder="https://">
    <button type="submit">Preview</button>
  </form>

  {% if result %}
    <pre class="output">{{ result | tojson(indent=2) }}</pre>
  {% endif %}
</section>
{% endblock %}
