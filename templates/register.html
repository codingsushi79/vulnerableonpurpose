{% extends "base.html" %}
{% block title %}Register Employee — SecureCorp{% endblock %}
{% block content %}
<section class="panel panel-narrow">
  <h2>Register employee account</h2>
  <p>Administrator provisioning — creates a portal account and signs you in as the new user.</p>

  <form method="post" action="{{ url_for('admin_register') }}">
    <label for="username">Username</label>
    <input id="username" name="username" autocomplete="off" required>

    <label for="email">Work email</label>
    <input id="email" name="email" type="email" autocomplete="off" required>

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="new-password" required>

    <label for="role">Role</label>
    <select id="role" name="role">
      <option value="user">Employee (standard)</option>
      <option value="admin">Administrator</option>
    </select>

    <button type="submit">Create account &amp; switch session</button>
  </form>

  <p class="form-footer">
    <a href="{{ url_for('dashboard') }}">Back to dashboard</a>
  </p>
</section>
{% endblock %}
