{% extends "base.html" %}
{% block title %}Directory — SecureCorp{% endblock %}
{% block content %}
<section class="panel">
  <h2>Employee Directory</h2>
  <form method="get" action="{{ url_for('search') }}">
    <label for="q">Search by name or department</label>
    <input id="q" name="q" value="{{ raw_query }}" placeholder="e.g. Jane Smith">
    <button type="submit">Search</button>
  </form>

  {% if ssti_result is not none %}
    <div class="search-results">
      <p>Template preview:</p>
      <div>{{ ssti_result }}</div>
    </div>
  {% elif raw_query %}
    <div class="search-results">
      <p>Showing results for <strong>{{ query }}</strong></p>
    </div>
  {% endif %}
</section>
{% endblock %}
